<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptimus Network Orchestration | Demo Lite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --color-bg: #0b0c10;
            --color-surface: #1f2833;
            --color-surface-hover: #2c3a47;
            --color-primary: #45a29e;
            --color-primary-light: #66fcf1;
            --color-text-primary: #f8fafc;
            --color-text-secondary: #94a3b8;
            --glass-bg: rgba(31, 40, 51, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --color-status-success: #10b981;
            --color-status-warning: #f59e0b;
            --color-status-error: #ef4444;
            --font-family-base: 'Inter', system-ui, -apple-system, sans-serif;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --border-radius-lg: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--color-bg);
            background-image: 
                radial-gradient(ellipse at top right, rgba(69, 162, 158, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(139, 92, 246, 0.12) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--color-text-primary);
            font-family: var(--font-family-base);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: var(--spacing-lg); }

        header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .title { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
        .subtitle { color: var(--color-text-secondary); margin-top: 4px; }

        .tabs { 
            display: flex; 
            gap: 8px; 
            background: var(--glass-bg); 
            padding: 4px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border);
            margin-bottom: 32px;
            backdrop-filter: var(--glass-blur);
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        .tab { 
            flex: 1; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 600; 
            transition: all 0.2s;
            color: var(--color-text-secondary);
        }
        .tab.active { 
            background: var(--color-primary); 
            color: var(--color-bg); 
        }

        .content-section { display: none; animation: fadeIn 0.4s ease-out; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .card { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: var(--border-radius-lg); 
            padding: var(--spacing-lg); 
            backdrop-filter: var(--glass-blur);
        }

        .kpi-value { font-size: 2.5rem; font-weight: 700; color: var(--color-primary-light); margin: 8px 0; }
        .kpi-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--color-text-secondary); letter-spacing: 0.05em; }

        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px; 
            border-bottom: 1px solid var(--glass-border);
        }
        .list-item:last-child { border-bottom: none; }
        
        .status-pill { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-transform: uppercase;
        }
        .status-available { background: rgba(16, 185, 129, 0.1); color: var(--color-status-success); }
        .status-faulted { background: rgba(239, 68, 68, 0.1); color: var(--color-status-error); }
        .status-offline { background: rgba(107, 114, 128, 0.1); color: var(--color-text-secondary); }

        .map-proxy { 
            height: 300px; 
            background: rgba(30, 41, 59, 0.3); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            margin-bottom: 32px;
        }
        .map-dot { position: absolute; width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        @media (max-width: 600px) {
            .title { font-size: 1.5rem; }
            .kpi-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1 class="title">Network Orchestration</h1>
                <p class="subtitle">Real-time infrastructure health & AI insights.</p>
            </div>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="showTab('overview')">Overview</div>
            <div class="tab" onclick="showTab('chargers')">Chargers</div>
            <div class="tab" onclick="showTab('techs')">Technicians</div>
        </div>

        <!-- OVERVIEW SECTION -->
        <div id="overview" class="content-section active">
            <div class="kpi-grid">
                <div class="card">
                    <div class="kpi-label">Average MTTR</div>
                    <div class="kpi-value">28.4 <small style="font-size: 0.4em; color: var(--color-text-secondary)">HRS</small></div>
                    <div style="font-size: 0.7rem; color: var(--color-status-success)">Target: < 48.0 hrs</div>
                </div>
                <div class="card">
                    <div class="kpi-label">Network Uptime</div>
                    <div class="kpi-value">98.7 <small style="font-size: 0.4em; color: var(--color-text-secondary)">%</small></div>
                    <div style="font-size: 0.7rem; color: var(--color-status-success)">Target: > 98.5%</div>
                </div>
                <div class="card">
                    <div class="kpi-label">First-Time Fix</div>
                    <div class="kpi-value">92 <small style="font-size: 0.4em; color: var(--color-text-secondary)">%</small></div>
                    <div style="font-size: 0.7rem; color: var(--color-text-secondary)">Remote Triage Success</div>
                </div>
            </div>

            <div class="map-proxy" id="map-lite">
                <!-- Points added by JS -->
                <div style="color: var(--color-text-secondary); z-index: 2; text-align: center;">
                    <div style="font-weight: 700;">Live Asset Map</div>
                    <div style="font-size: 0.8rem;">Visualizing Berlin Cluster</div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 16px;">AI Dispatch Manifests</h3>
                <div id="manifest-list">
                    <!-- Added by JS -->
                </div>
            </div>
        </div>

        <!-- CHARGERS SECTION -->
        <div id="chargers" class="content-section">
            <div class="card" style="padding: 0;">
                <div id="charger-list">
                    <!-- Added by JS -->
                </div>
            </div>
        </div>

        <!-- TECHS SECTION -->
        <div id="techs" class="content-section">
            <div class="card" style="padding: 0;">
                <div id="tech-list">
                    <!-- Added by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const MOCK_CHARGERS = [
            { id: 'CHG-DE-4921', brand: 'Alpitronic', model: 'HYC300', city: 'Berlin', status: 'Available', power: '300kW' },
            { id: 'CHG-DE-1030', brand: 'ABB', model: 'Terra 54', city: 'Hamburg', status: 'Faulted', power: '50kW' },
            { id: 'CHG-NL-5503', brand: 'Alpitronic', model: 'HYC300', city: 'Utrecht', status: 'Available', power: '300kW' },
            { id: 'CHG-BE-2204', brand: 'Alpitronic', model: 'HYC150', city: 'Antwerp', status: 'Offline', power: '150kW' }
        ];

        const MOCK_TECHS = [
            { name: 'Hans Müller', company: 'PowerGrid DE', city: 'Berlin', available: false, mttr: '25.1h' },
            { name: 'Klaus Wagner', company: 'PowerGrid DE', city: 'Berlin', available: true, mttr: '19.5h' },
            { name: 'Jan de Vries', company: 'EcoFix NL', city: 'Amsterdam', available: false, mttr: '21.8h' },
            { name: 'Luc Peeters', company: 'ChargeFast BE', city: 'Brussels', available: true, mttr: '20.4h' }
        ];

        const MOCK_MANIFESTS = [
            { id: 'CHG-DE-4921', issue: 'Cooling Blockage', prob: '89%', eta: '48-72 hrs' },
            { id: 'CHG-DE-1030', issue: 'DC Contactor Arc', prob: '94%', eta: '< 24 hrs' }
        ];

        function showTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function init() {
            // Render Manifests
            const manifestList = document.getElementById('manifest-list');
            MOCK_MANIFESTS.forEach(m => {
                manifestList.innerHTML += `
                    <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; margin-bottom: 12px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="font-weight: 700;">${m.id}</span>
                            <span style="color: var(--color-status-warning); font-size: 0.8rem; font-weight: 600;">${m.prob} Probability</span>
                        </div>
                        <div style="font-size: 0.85rem; color: var(--color-text-secondary); margin-top: 4px;">Predicted: ${m.issue}</div>
                        <div style="font-size: 0.75rem; color: var(--color-primary-light); margin-top: 4px;">SLA ETA: ${m.eta}</div>
                    </div>
                `;
            });

            // Render Chargers
            const chargerList = document.getElementById('charger-list');
            MOCK_CHARGERS.forEach(c => {
                chargerList.innerHTML += `
                    <div class="list-item">
                        <div>
                            <div style="font-weight: 700;">${c.id}</div>
                            <div style="font-size: 0.75rem; color: var(--color-text-secondary);">${c.brand} ${c.model} • ${c.power}</div>
                        </div>
                        <span class="status-pill status-${c.status.toLowerCase()}">${c.status}</span>
                    </div>
                `;
            });

            // Render Techs
            const techList = document.getElementById('tech-list');
            MOCK_TECHS.forEach(t => {
                techList.innerHTML += `
                    <div class="list-item">
                        <div>
                            <div style="font-weight: 700;">${t.name}</div>
                            <div style="font-size: 0.75rem; color: var(--color-text-secondary);">${t.company} • ${t.city}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 0.8rem; font-weight: 600; color: ${t.available ? 'var(--color-status-success)' : 'var(--color-status-error)'}">${t.available ? 'Available' : 'Busy'}</div>
                            <div style="font-size: 0.7rem; color: var(--color-text-secondary);">MTTR: ${t.mttr}</div>
                        </div>
                    </div>
                `;
            });

            // Mini map dots
            const map = document.getElementById('map-lite');
            for(let i=0; i<8; i++) {
                const dot = document.createElement('div');
                dot.className = 'map-dot';
                dot.style.left = Math.random() * 80 + 10 + '%';
                dot.style.top = Math.random() * 80 + 10 + '%';
                dot.style.color = Math.random() > 0.3 ? 'var(--color-primary-light)' : 'var(--color-status-error)';
                dot.style.backgroundColor = dot.style.color;
                map.appendChild(dot);
            }
        }

        init();
    </script>
</body>
</html>
